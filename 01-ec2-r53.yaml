- name: Create EC2 and Route53 using Ansible
  hosts: localhost
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0cc0fcc211dfab4e5
    zone_id: Z09532653LYSJAOMBYJTE
    domain_name: sitaram.icu
    region: us-east-1

  tasks:
  - name: Creating EC2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      region: "{{ region }}"
    loop:
      - mongodb
      - mysql
      - redis
      - rabbitmq
      - catalogue
      - user
      - cart
      - shipping
      - payment
      - frontend
    register: ec2_output


  # - name: Print EC2 output
  #   ansible.builtin.debug:
  #     msg: "{{ ec2_output }}"
  - name: create route53 record
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name }}" # mongodb.daws86s.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"

  # we are creating one record with public only for frontend
  - name: create route53 record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}" # daws86s.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      overwrite: true
    when: item.item == "frontend"
    loop: "{{ ec2_output.results }}"