- name : install maven
  ansible.builtin.package:
    name : "{{ item }}"
    state : present
  loop :
  - maven
  - mysql
- name : install mysql libraries
  ansible.builtin.pip:
    executable : pip3.9
    name : "{{ item }}"
  loop :
  - pymysql
  - cryptography

- name : install the dependencies
  ansible.builtin.command: mvn clean package
  args: 
    chdir: /app

- name : move jar file
  ansible.builtin.command: mv target/{{ componenet }}-1.0.jar {{ componenet }}.jar 
  args :
    chdir : /app
  